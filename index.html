<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ My Love ❤️</title>

<style>
body{
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff4d6d,#ff8fab);
font-family:Arial,sans-serif;
overflow:hidden;
}

.card{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h1{
color:#ff2e63;
font-size:40px;
margin-bottom:10px;
}

p{
font-size:22px;
color:#444;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100vh);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}
</style>

</head>
<body>

<div class="card">
<h1>❤️ I Love You ❤️</h1>
<p>جني 💖</p>
<p>أنتِ أجمل حاجة حصلت في حياتي 🌹</p>
</div>

<script>
for(let i=0;i<50;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*5)+"s";
heart.style.fontSize=(15+Math.random()*25)+"px";
document.body.appendChild(heart);
}
</script>

</body>
</html>

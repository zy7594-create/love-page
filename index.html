<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>رحمه ❤️</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  font-family: Arial, sans-serif;
}

.card {
  background: rgba(255,255,255,0.95);
  width: 90%;
  max-width: 420px;
  padding: 30px;
  border-radius: 30px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,.2);
  z-index: 2;
}

.heart {
  font-size: 60px;
  animation: pulse 1s infinite;
}

h1 {
  color: #ff4d6d;
  font-size: 35px;
}

p {
  color: #444;
  font-size: 20px;
  line-height: 1.8;
}

button {
  background: #ff4d6d;
  color: white;
  border: none;
  padding: 14px 28px;
  border-radius: 30px;
  font-size: 18px;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}

#message {
  color:#ff4d6d;
  font-weight:bold;
  margin-top:15px;
}

/* القلوب */
.floating-heart {
  position: absolute;
  bottom: -50px;
  font-size: 30px;
  animation: up 6s linear infinite;
}

@keyframes up {
  from {
    transform: translateY(0);
    opacity:1;
  }
  to {
    transform: translateY(-110vh);
    opacity:0;
  }
}

@keyframes pulse {
  50% {
    transform: scale(1.2);
  }
}
</style>

</head>

<body>

<div class="card">

<div class="heart">❤️</div>

<h1>رحمه ❤️</h1>

<p>
وجودك في حياتي حاجة جميلة ومميزة ❤️<br>
ومهما أقول مش هوصف قد إيه أنتِ شخص غالي.<br><br>

أتمنى أشوفك دايمًا مبسوطة،<br>
وتفضل الضحكة على وشك،<br>
وربنا يحققلك كل اللي نفسك فيه ❤️
</p>

<button onclick="showLove()">اضغطي هنا يا رحمه ❤️</button>

<p id="message"></p>

</div>


<script>

function showLove(){
document.getElementById("message").innerHTML =
"رحمه ❤️ وجودك فرق كبير ومكانك مميز ✨";
}


// قلوب متحركة
setInterval(function(){

let heart = document.createElement("div");
heart.className="floating-heart";
heart.innerHTML="❤️";

heart.style.left = Math.random()*100+"%";
heart.style.animationDuration =
(3 + Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},500);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Page ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  font-family: Arial, sans-serif;
}

.card {
  background: white;
  width: 85%;
  max-width: 400px;
  padding: 30px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  animation: show 1.5s ease;
}

h1 {
  color: #ff4d6d;
  font-size: 32px;
}

p {
  color: #444;
  font-size: 19px;
  line-height: 1.8;
}

.heart {
  font-size: 55px;
  animation: beat 1s infinite;
}

button {
  background: #ff4d6d;
  color: white;
  border: none;
  padding: 12px 25px;
  border-radius: 30px;
  font-size: 18px;
  cursor: pointer;
}

#message {
  margin-top: 15px;
  color: #ff4d6d;
  font-weight: bold;
}

@keyframes beat {
  50% {
    transform: scale(1.2);
  }
}

@keyframes show {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

</head>

<body>

<div class="card">

<div class="heart">❤️</div>

<h1>إلى رحمه ❤️</h1>

<p>
رحمه ❤️<br>
وجودك في حياتي حاجة جميلة ومميزة، ومهما أقول مش هوصف قد إيه أنتِ شخص غالي.<br><br>

أتمنى أشوفك دايمًا مبسوطة، وتفضل الضحكة على وشك، وربنا يحققلك كل اللي نفسك فيه ❤️
</p>

<button onclick="showLove()">اضغطي هنا يا رحمه ❤️</button>

<p id="message"></p>

</div>


<script>
function showLove() {
document.getElementById("message").innerHTML =
"رحمه ❤️ أنتِ شخص مميز جدًا ومكانك كبير ✨";
}
</script>

</body>
</html>
